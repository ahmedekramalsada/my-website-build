apiVersion: v1
kind: Namespace
metadata:
  name: uwbp
  labels:
    name: uwbp
    app.kubernetes.io/name: universal-website-builder
    app.kubernetes.io/version: "1.0.0"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: uwbp-quota
  namespace: uwbp
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    persistentvolumeclaims: "20"
    services: "20"
    secrets: "20"
    configmaps: "20"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: uwbp
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
